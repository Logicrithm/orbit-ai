<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orbit</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --line: #2d333b;
    --text: #e6edf3; --dim: #8b949e; --accent: #d4a656;
    --bar: #d4a656; --bar-bg: #2d333b;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
         font: 15px/1.55 -apple-system, "Segoe UI", sans-serif; }
  .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 0;
          height: 100vh; max-width: 1200px; margin: 0 auto; }

  /* left: conversation */
  .chat { display: flex; flex-direction: column; border-right: 1px solid var(--line); }
  .head { padding: 18px 24px; border-bottom: 1px solid var(--line); }
  .head h1 { font: 600 20px Georgia, serif; letter-spacing: 3px; color: var(--accent); }
  .head p  { color: var(--dim); font-size: 13px; margin-top: 2px; }
  .msgs { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .msg { max-width: 85%; margin-bottom: 14px; padding: 12px 16px; border-radius: 10px; }
  .orbit { background: var(--panel); font-family: Georgia, serif; }
  .orbit.reflect { border-left: 3px solid var(--accent); color: var(--accent); font-style: italic; }
  .me { background: #1f3a5f; margin-left: auto; }
  .inputrow { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--line); }
  textarea { flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text);
             border-radius: 8px; padding: 10px 14px; font: inherit; resize: none; height: 64px; }
  button { background: var(--accent); color: #0d1117; border: 0; border-radius: 8px;
           padding: 0 22px; font: 600 14px inherit; cursor: pointer; }
  button:disabled { opacity: .4; cursor: wait; }
  .thinking { color: var(--dim); font-style: italic; }

  /* right: what orbit sees */
  .panel { padding: 22px 24px; overflow-y: auto; }
  .panel h2 { font: 600 13px inherit; letter-spacing: 2px; text-transform: uppercase;
              color: var(--dim); margin-bottom: 18px; }
  .trait { margin-bottom: 16px; cursor: pointer; }
  .trait .row { display: flex; justify-content: space-between; font-size: 13px; }
  .trait .lean { color: var(--accent); }
  .trait .fix { color: var(--dim); font-size: 11px; visibility: hidden; }
  .trait:hover .fix { visibility: visible; }
  .bar { height: 6px; background: var(--bar-bg); border-radius: 3px; margin-top: 5px; }
  .bar i { display: block; height: 100%; background: var(--bar); border-radius: 3px;
           transition: width .6s; }
  .ev { color: var(--dim); font-size: 12px; font-style: italic; margin-top: 4px; }
  .ev::before { content: "“"; } .ev::after { content: "”"; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 16px; }
  .chip { background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
          padding: 3px 12px; font-size: 12px; }
  .chip b { color: var(--dim); margin-left: 6px; cursor: pointer; }
  .sect { color: var(--dim); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  #matchbtn { width: 100%; margin-top: 14px; padding: 12px; display: none; }

  /* match cards */
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
          padding: 18px; margin-bottom: 14px; }
  .card .type { display: inline-block; font-size: 11px; letter-spacing: 1.5px;
                text-transform: uppercase; color: var(--accent);
                border: 1px solid var(--accent); border-radius: 20px; padding: 2px 10px; }
  .card h3 { font: 600 18px Georgia, serif; margin: 8px 0 6px; }
  .card .why { color: var(--text); }
  .card .act { margin-top: 10px; padding: 10px 14px; background: var(--bg);
               border-radius: 8px; color: var(--dim); font-size: 13px; }
  .card .act b { color: var(--accent); }
  .card .accept { width: 100%; margin-top: 12px; padding: 10px;
                  background: transparent; color: var(--accent);
                  border: 1px solid var(--accent); border-radius: 8px; }
  .card .accept:hover { background: var(--accent); color: #0d1117; }
  .card .optin { display: none; margin-top: 12px; padding: 12px 14px;
                 background: var(--bg); border-left: 3px solid var(--accent);
                 border-radius: 8px; font-size: 13px; color: var(--dim); }
  .card .optin b, .card .optin i { color: var(--accent); font-style: normal; }
  .roadmap { margin-top: 6px; padding: 14px; text-align: center; font-size: 13px;
             color: var(--dim); border: 1px dashed var(--line); border-radius: 12px; }
  .roadmap span { display: block; margin-top: 6px; color: var(--accent);
                  font-size: 12px; letter-spacing: 1px; }
  .accept.sim span { font-size: 10px; opacity: .7; }
  .space { margin-top: 4px; }
  .simtag { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--dim); border: 1px dashed var(--line); border-radius: 20px;
            display: inline-block; padding: 2px 10px; margin-bottom: 10px; }
  .ointro { font-family: Georgia, serif; font-style: italic; color: var(--accent);
            border-left: 3px solid var(--accent); padding: 8px 12px; margin-bottom: 10px; }
  .chatlog { max-height: 220px; overflow-y: auto; }
  .pmsg, .umsg { padding: 8px 12px; border-radius: 10px; margin-bottom: 8px;
                 font-size: 13px; max-width: 90%; }
  .pmsg { background: var(--bg); }  .pmsg b { color: var(--accent); margin-right: 6px; }
  .pmsg.dim { color: var(--dim); font-style: italic; }
  .umsg { background: #1f3a5f; margin-left: auto; }
  .chatrow { display: flex; gap: 8px; margin-top: 8px; }
  .chatrow input { flex: 1; background: var(--bg); border: 1px solid var(--line);
                   color: var(--text); border-radius: 8px; padding: 8px 12px; font: inherit; }
  .chatrow button { padding: 0 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="chat">
    <div class="head">
      <h1>O R B I T</h1>
      <p>an AI that learns who you actually are — and finds the people you should meet</p>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inputrow">
      <textarea id="inp" placeholder="answer honestly; short is fine, stories are better"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <div class="panel">
    <h2>what orbit sees</h2>
    <div id="traits"></div>
    <div id="lists"></div>
    <button id="matchbtn">find my people →</button>
    <div id="matches"></div>
  </div>
</div>

<script>
const POLES = { energy:["solitary","social"], planning:["improviser","planner"],
                openness:["fixed views","revises beliefs"], comm_depth:["light talker","deep talker"] };
let SID = null, DONE = false;

const $ = id => document.getElementById(id);
const msgs = $("msgs");

function add(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function api(path, body) {
  const r = await fetch("/api/" + path, { method:"POST",
    headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body||{}) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function renderProfile(p) {
  let t = "";
  for (const [trait,[lo,hi]] of Object.entries(POLES)) {
    const tr = p[trait];
    if (!tr || tr.confidence === 0) {
      t += `<div class="trait"><div class="row"><span>${trait.replace("_"," ")}</span>
            <span class="lean" style="color:var(--dim)">no signal yet</span></div>
            <div class="bar"><i style="width:0%"></i></div></div>`;
      continue;
    }
    const lean = tr.value < 50 ? lo : hi;
    const ev = p.evidence && p.evidence[trait] ? `<div class="ev">${p.evidence[trait]}</div>` : "";
    t += `<div class="trait" onclick="flip('${trait}')" title="click to correct">
            <div class="row"><span>${trait.replace("_"," ")}</span>
            <span><span class="lean">${lean}</span> <span class="fix">✎ wrong? click to flip</span></span></div>
            <div class="bar"><i style="width:${tr.confidence}%"></i></div>${ev}</div>`;
  }
  $("traits").innerHTML = t;

  let l = "";
  for (const key of ["values","strengths","gaps","dealbreakers"]) {
    if (!p[key] || !p[key].length) continue;
    l += `<div class="sect">${key === "dealbreakers" ? "avoids" : key}</div><div class="chips">`;
    for (const item of p[key])
      l += `<span class="chip">${item}<b onclick="removeItem('${key}',this)" title="remove">×</b></span>`;
    l += `</div>`;
  }
  $("lists").innerHTML = l;
}

async function flip(trait) {
  if (!SID) return;
  const r = await api("edit", { session_id:SID, action:"flip_trait", field:trait });
  renderProfile(r.profile);
}
async function removeItem(field, el) {
  const value = el.parentNode.firstChild.textContent;
  const r = await api("edit", { session_id:SID, action:"remove_item", field, value });
  renderProfile(r.profile);
}

async function send() {
  const text = $("inp").value.trim();
  if (!text || DONE) return;
  add("me", text); $("inp").value = "";
  $("send").disabled = true;
  const think = add("orbit thinking", "orbit is thinking…");
  try {
    const r = await api("answer", { session_id:SID, answer:text });
    think.remove();
    if (r.reflect_back) add("orbit reflect", r.reflect_back);
    renderProfile(r.profile);
    if (r.done) {
      DONE = true;
      add("orbit", "That's you — or at least, what your answers show. Anything on the panel look wrong? Click it to fix it. Then find your people.");
      $("matchbtn").style.display = "block";
    } else {
      add("orbit", r.question);
    }
  } catch(e) { think.textContent = "something broke: " + e.message; }
  $("send").disabled = false;
}

$("matchbtn").onclick = async () => {
  $("matchbtn").disabled = true; $("matchbtn").textContent = "orbit is choosing…";
  const r = await api("match", { session_id:SID, answer:"" });
  let h = "";
  r.matches.forEach((m, i) => {
    h += `<div class="card"><span class="type">${m.connection_type.replace("_"," ")}</span>
          <h3>${m.name}</h3><div class="why">${m.reason}</div>
          <div class="act"><b>your first 30 minutes:</b> ${m.first_activity}</div>
          <button class="accept" id="acc${i}" onclick="accept(${i}, '${m.name.replace(/'/g,"")}')">
            I'd like to meet ${m.name} →</button>
          <div class="optin" id="opt${i}"></div></div>`;
  });
  h += `<div class="roadmap">Orbit's next orbit: after you meet, it asks how it went —
        and gets better at knowing you. <span>double opt-in → AI-brokered intro →
        feedback → your profile evolves</span></div>`;
  $("matches").innerHTML = h || "<p style='color:var(--dim)'>no one passed your filters — population too small.</p>";
  $("matchbtn").style.display = "none";
};

function accept(i, name) {
  $("acc"+i).style.display = "none";
  $("opt"+i).innerHTML =
    `<b>✓ Your side is in.</b> In Orbit, no contact opens until <i>both</i> people
     say yes — ${name} would now get the same choice.<br>
     <button class="accept sim" onclick="simAccept(${i}, '${name}')">
       ▶ simulate ${name}'s acceptance <span>(demo — seeds are synthetic)</span></button>`;
  $("opt"+i).style.display = "block";
}

async function simAccept(i, name) {
  $("opt"+i).innerHTML = `<span style="color:var(--dim)">orbit is writing the introduction…</span>`;
  const r = await api("intro", { session_id:SID, name });
  $("opt"+i).innerHTML =
    `<div class="space">
       <div class="simtag">shared space — ${name}'s side simulated for demo</div>
       <div class="ointro">${r.intro}</div>
       <div class="chatlog" id="log${i}">
         <div class="pmsg"><b>${name}</b> ${r.opener}</div>
       </div>
       <div class="chatrow">
         <input id="ci${i}" placeholder="reply to ${name}…">
         <button onclick="sendChat(${i}, '${name}')">send</button>
       </div>
     </div>`;
  $("ci"+i).addEventListener("keydown", e => {
    if (e.key === "Enter") sendChat(i, name);
  });
}

async function sendChat(i, name) {
  const inp = $("ci"+i), text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  const log = $("log"+i);
  log.innerHTML += `<div class="umsg">${text}</div>`;
  log.innerHTML += `<div class="pmsg dim" id="wait${i}">${name} is typing…</div>`;
  log.scrollTop = log.scrollHeight;
  const r = await api("chat", { session_id:SID, name, message:text });
  $("wait"+i).outerHTML = `<div class="pmsg"><b>${name}</b> ${r.reply}</div>`;
  log.scrollTop = log.scrollHeight;
}

$("send").onclick = send;
$("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

(async () => {
  const r = await api("start");
  SID = r.session_id;
  add("orbit", "Let's figure out who you actually are. Seven questions — answer honestly; stories beat summaries.");
  add("orbit", r.question);
  renderProfile({ energy:{confidence:0}, planning:{confidence:0},
                  openness:{confidence:0}, comm_depth:{confidence:0}, evidence:{} });
})();
</script>
</body>
</html>
